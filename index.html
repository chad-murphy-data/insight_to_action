<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insight Kitchen — BeSci Overcooked</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Outfit',sans-serif;color:#ccc}
  h1{font-family:'Press Start 2P',monospace;font-size:20px;color:#f0c040;text-shadow:2px 2px 0 #d4780088,0 0 20px #f0c04044;letter-spacing:2px}
  #lobby{text-align:center;max-width:400px}
  #lobby p{margin:12px 0;font-size:14px;color:#8888aa}
  .btn{font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 24px;border:2px solid #f0c040;background:transparent;color:#f0c040;border-radius:6px;cursor:pointer;margin:6px;transition:all .2s}
  .btn:hover{background:#f0c04022}
  .btn:disabled{opacity:.4;cursor:default}
  #room-code{font-family:'Press Start 2P',monospace;font-size:24px;color:#f0c040;letter-spacing:4px;margin:16px 0}
  input[type=text]{font-family:'Press Start 2P',monospace;font-size:14px;padding:10px 16px;background:#2a2a4e;border:2px solid #444466;border-radius:6px;color:#f0c040;text-align:center;text-transform:uppercase;width:240px;letter-spacing:3px}
  input::placeholder{color:#555;font-size:10px;letter-spacing:1px}
  #status{font-size:12px;color:#88aa88;margin:10px 0}
  #game-wrap{display:none;flex-direction:column;align-items:center}
  #game-container{border:2px solid #333355;border-radius:8px;overflow:hidden;box-shadow:0 0 40px #0004}
  canvas{display:block}
  #controls{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;font-size:10px}
  .p1c{color:#88bbff}.p2c{color:#ffbb88}
  .key{display:inline-block;background:#2a2a4e;border:1px solid #444466;border-radius:3px;padding:1px 5px;font-family:'Press Start 2P',monospace;font-size:7px;color:#ccccdd}
  #hud{margin-top:6px;display:flex;gap:20px;font-size:12px}
  .hv{color:#f0c040;font-weight:bold}
  .mbtn{font-family:"Press Start 2P",monospace;font-size:16px;width:50px;height:50px;border:2px solid #f0c040;background:#2a2a4e;color:#f0c040;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}  .mbtn:active,.mbtn.pressed{background:#f0c04044}  @media(pointer:coarse){#mobile-controls{display:flex!important}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>INSIGHT KITCHEN</h1>
  <p>A BeSci Overcooked game for virtual onsites</p>
  <div style="margin:30px 0">
    <button class="btn" id="btn-bot" onclick="playWithBot()">Play with Bot 🤖</button>
    <p style="font-size:11px;color:#555">— or play online —</p>
    <button class="btn" id="btn-create" onclick="createRoom()">Create Room</button>
    <p style="font-size:11px;color:#555">— or —</p>
    <input type="text" id="code-input" placeholder="Enter room code" maxlength="16"/>
    <br>
    <button class="btn" id="btn-join" onclick="joinRoom()">Join Room</button>
  </div>
  <div id="room-code" style="display:none"></div>
  <div id="status"></div>
  <p style="font-size:10px;color:#444;margin-top:40px">Pipeline: Inbox → Analysis → Deck Builder → Delivery 🎉</p>
</div>

<!-- GAME -->
<div id="game-wrap">
  <div id="game-container"><canvas id="game"></canvas></div>
  <div id="controls">
    <span class="p1c"><span class="key">WASD</span> + <span class="key">SPACE</span> — Owner</span>
    <span class="p2c"><span class="key">IJKL</span> + <span class="key">ENTER</span> — Employee</span>
    <span style="color:#f0c040">Inbox → Analysis → Deck Builder → Delivery</span>
  </div>
  <div id="hud">
    <span>Score: <span class="hv" id="score">0</span></span>
    <span class="p1c">Owner: <span class="hv" id="p1c">—</span></span>
    <span class="p2c">Employee: <span class="hv" id="p2c">—</span></span>
  </div>
  <!-- Mobile Controls -->  <div id="mobile-controls" style="display:none;margin-top:12px;user-select:none;-webkit-user-select:none;touch-action:none">    <div style="display:flex;align-items:center;gap:20px">      <div style="display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px 50px;gap:4px">        <div></div>        <button class="mbtn" data-key="w">&#9650;</button>        <div></div>        <button class="mbtn" data-key="a">&#9664;</button>        <button class="mbtn" data-key="s">&#9660;</button>        <button class="mbtn" data-key="d">&#9654;</button>      </div>      <button class="mbtn act-btn" data-key=" " style="width:80px;height:80px;border-radius:50%;font-size:14px">ACT</button>    </div>  </div>
</div>

<script>
// ==================== CONFIGURATION ====================
// IMPORTANT: Update this URL after deploying to Render!
const RELAY_URL = 'wss://insight-to-action.onrender.com';
// For local testing: const RELAY_URL = 'ws://localhost:3001';

// ==================== NETWORK ====================
let ws = null;
let role = null; // 'host' or 'guest'
let connected = false;
let guestInput = { up:false, down:false, left:false, right:false, act:false };
let botActive = false;
let botInterval = null;
let botState = 'IDLE';
let botActCooldown = 0;

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function connectWS() {
  return new Promise((resolve, reject) => {
    ws = new WebSocket(RELAY_URL);
    ws.onopen = () => { setStatus('Connected to server'); resolve(); };
    ws.onerror = () => { setStatus('Cannot reach server — is it deployed?'); reject(); };
    ws.onclose = () => { setStatus('Disconnected'); connected = false; };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      switch(msg.type) {
        case 'created':
          document.getElementById('room-code').style.display = 'block';
          document.getElementById('room-code').textContent = msg.code;
          setStatus('Waiting for player 2... Share the code over Zoom!');
          break;
        case 'guest_joined':
          setStatus('Player 2 connected! Starting game...');
          connected = true;
          stopBot(); // hand off to human
          setTimeout(() => startGame(), 500);
          break;
        case 'joined':
          setStatus('Joined! Waiting for host to start...');
          connected = true;
          role = 'guest';
          setTimeout(() => startGame(), 500);
          break;
        case 'state':
          if (role === 'guest') applyState(msg.data);
          break;
        case 'input':
          if (role === 'host') guestInput = msg.data;
          break;
        case 'peer_left':
          setStatus('Other player disconnected!');
          connected = false;
          break;
        case 'error':
          setStatus('Error: ' + msg.msg);
          break;
      }
    };
  });
}

async function createRoom() {
  document.getElementById('btn-create').disabled = true;
  setStatus('Connecting...');
  try {
    await connectWS();
    role = 'host';
    ws.send(JSON.stringify({ type: 'create' }));
  } catch(e) {}
}

async function joinRoom() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (!code) { setStatus('Enter a room code'); return; }
  document.getElementById('btn-join').disabled = true;
  setStatus('Connecting...');
  try {
    await connectWS();
    role = 'guest';
    ws.send(JSON.stringify({ type: 'join', code }));
  } catch(e) {}
}

// Send game state from host to guest (called every frame)
function sendState(state) {
  if (ws?.readyState === 1 && role === 'host' && connected) {
    ws.send(JSON.stringify({ type: 'state', data: state }));
  }
}

// Send guest input to host
function sendInput(input) {
  if (ws?.readyState === 1 && role === 'guest' && connected) {
    ws.send(JSON.stringify({ type: 'input', data: input }));
  }
}

// ==================== GAME ENGINE ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const CW=1100,CH=750,TW=96,TH=48,GC=8,GR=8;
const ACCEL=12,FRIC=4.5,MSPD=3.8,BNC=0.3,AFPS=10;
canvas.width=CW;canvas.height=CH;
const FC=8,FR=4,FW=60,FH=112,SS=1.15,DW=FW*SS,DH=FH*SS;
const DIR={DL:0,UL:1,UR:2,DR:3};
const s1=new Image();s1.src='owner.png';
const s2=new Image();s2.src='employee.png';
let s1ok=false,s2ok=false;s1.onload=()=>{s1ok=true};s2.onload=()=>{s2ok=true};

function g2s(gx,gy){return{x:CW/2+(gx-gy)*(TW/2),y:180+(gx+gy)*(TH/2)}}
function gd(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2)}

const ITEMS={
  RAW:{name:'Raw Insight',color:'#e07040',sym:'📋',next:'ANA',st:'INBOX'},
  ANA:{name:'Analyzed',color:'#40a0e0',sym:'📊',next:'DRAFT',st:'ANALYSIS'},
  DRAFT:{name:'Draft Deck',color:'#e0c040',sym:'📑',next:'DONE',st:'DECK BUILDER'},
  DONE:{name:'Polished',color:'#50b060',sym:'✅',next:null,st:'DELIVERY'},
};
const STA=[
  {n:'INBOX',gx:0,gy:3,c:'#e07040',items:[],pt:0},
  {n:'ANALYSIS',gx:2,gy:0,c:'#40a0e0',items:[],pt:2.0},
  {n:'DECK BUILDER',gx:5,gy:0,c:'#e0c040',items:[],pt:1.5},
  {n:'DELIVERY',gx:7,gy:4,c:'#50b060',items:[],pt:0},
  {n:'REVISIONS',gx:7,gy:7,c:'#c04060',items:[],pt:3.0},
];
const SICO={'INBOX':'📥','ANALYSIS':'🔬','DECK BUILDER':'🖥️','DELIVERY':'📤','REVISIONS':'🔄'};
function fSta(n){return STA.find(s=>s.n===n)}

let score=0,spT=0;const SPI=4,IR=1.4;
const particles=[];

function mkP(gx,gy){return{gx,gy,vx:0,vy:0,dir:DIR.DL,fr:0,at:0,mv:false,carry:null}}
const p1=mkP(2.5,3.5),p2=mkP(4.5,4.5);
const pls=[p1,p2];

const keys={},jp={};
window.addEventListener('keydown',e=>{if(document.activeElement.tagName==='INPUT')return;const k=e.key.toLowerCase();if(!keys[k])jp[k]=true;keys[k]=true;e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

function spawnCel(gx,gy){const{x,y}=g2s(gx,gy);const em=['🎉','⭐','✨','🎯','💯','🔥','📊'];for(let i=0;i<12;i++)particles.push({x,y:y-10,vx:(Math.random()-.5)*120,vy:-Math.random()*100-40,life:1+Math.random()*.8,ml:1+Math.random()*.8,em:em[Math.floor(Math.random()*em.length)],sz:10+Math.random()*10,g:60})}

// Drawing functions
const TC=['#3d5a80','#3a5578'];
function dTile(c,r){const{x,y}=g2s(c,r);ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+TW/2,y+TH/2);ctx.lineTo(x,y+TH);ctx.lineTo(x-TW/2,y+TH/2);ctx.closePath();ctx.fillStyle=TC[(c+r)%2];ctx.fill();ctx.strokeStyle='#2a3f5f';ctx.lineWidth=1;ctx.stroke()}

function dBox(x,y,c){
  // Isometric crate: ~32px wide, ~20px tall
  const hw=16,hh=8,ht=12;const by=y+TH/2-ht;
  // Parse hex color and make 3 shades
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  const top=`rgb(${Math.min(255,r+50)},${Math.min(255,g+50)},${Math.min(255,b+50)})`;
  const left=c;
  const right=`rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`;
  // Top face
  ctx.beginPath();ctx.moveTo(x,by-hh);ctx.lineTo(x+hw,by);ctx.lineTo(x,by+hh);ctx.lineTo(x-hw,by);ctx.closePath();ctx.fillStyle=top;ctx.fill();ctx.strokeStyle='#0003';ctx.lineWidth=0.5;ctx.stroke();
  // Left face
  ctx.beginPath();ctx.moveTo(x-hw,by);ctx.lineTo(x,by+hh);ctx.lineTo(x,by+hh+ht);ctx.lineTo(x-hw,by+ht);ctx.closePath();ctx.fillStyle=left;ctx.fill();ctx.stroke();
  // Right face
  ctx.beginPath();ctx.moveTo(x+hw,by);ctx.lineTo(x,by+hh);ctx.lineTo(x,by+hh+ht);ctx.lineTo(x+hw,by+ht);ctx.closePath();ctx.fillStyle=right;ctx.fill();ctx.stroke();
}

function dSta(s){
  const{x,y}=g2s(s.gx,s.gy);const t=Date.now()/1000;const ip=s.items.some(i=>i.p);
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+TW/2,y+TH/2);ctx.lineTo(x,y+TH);ctx.lineTo(x-TW/2,y+TH/2);ctx.closePath();
  ctx.fillStyle=s.c+(ip?Math.round((.4+.25*Math.sin(t*6))*255).toString(16).padStart(2,'0'):'44');ctx.fill();ctx.strokeStyle=s.c;ctx.lineWidth=1.5;ctx.stroke();
  dBox(x,y,s.c);
  const dW_=TW*.6,dT=y+TH/2-18;
  ctx.fillStyle=s.c+'aa';ctx.beginPath();ctx.moveTo(x,dT);ctx.lineTo(x+dW_/2,dT+TH*.3);ctx.lineTo(x,dT+TH*.6);ctx.lineTo(x-dW_/2,dT+TH*.3);ctx.closePath();ctx.fill();
  ctx.fillStyle=s.c+'77';ctx.beginPath();ctx.moveTo(x,dT+TH*.6);ctx.lineTo(x+dW_/2,dT+TH*.3);ctx.lineTo(x+dW_/2,dT+TH*.3+18);ctx.lineTo(x,dT+TH*.6+18);ctx.closePath();ctx.fill();
  ctx.fillStyle=s.c+'55';ctx.beginPath();ctx.moveTo(x,dT+TH*.6);ctx.lineTo(x-dW_/2,dT+TH*.3);ctx.lineTo(x-dW_/2,dT+TH*.3+18);ctx.lineTo(x,dT+TH*.6+18);ctx.closePath();ctx.fill();
  ctx.save();ctx.font='20px sans-serif';ctx.textAlign='center';ctx.fillText(SICO[s.n]||'📦',x,dT-2+Math.sin(t*2+s.gx)*2);ctx.restore();
  ctx.save();ctx.font='bold 9px "Outfit",sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';const pw=ctx.measureText(s.n).width+12;ctx.fillStyle=s.c+'dd';ctx.beginPath();ctx.roundRect(x-pw/2,dT-32,pw,16,3);ctx.fill();ctx.fillStyle='#fff';ctx.fillText(s.n,x,dT-19);ctx.restore();
  s.items.forEach((it,i)=>{const inf=ITEMS[it.t],ix=x+(i-(s.items.length-1)/2)*18,ib=dT+TH*.6+36;let bob=it.p?Math.abs(Math.sin(t*4+i))*-6:0;ctx.save();ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText(inf.sym,ix,ib+bob);
  if(it.p&&s.pt>0){const pc=it.pr/s.pt,bw=24,bh=4,bx=ix-bw/2,by=ib+4;ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,bh);const gr=ctx.createLinearGradient(bx,0,bx+bw,0);gr.addColorStop(0,s.c);gr.addColorStop(1,'#fff');ctx.fillStyle=gr;ctx.fillRect(bx,by,bw*pc,bh);for(let pp=0;pp<3;pp++){const pt_=t*3+pp*2.1+i;ctx.globalAlpha=(Math.sin(pt_*3)+1)/2*.7;ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(ix+Math.sin(pt_*1.7)*12,ib-8+Math.cos(pt_*2.3)*8+bob,1.5,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}
  if(it.rdy&&!it.p&&Math.sin(t*6)>0){ctx.font='bold 8px "Outfit",sans-serif';ctx.fillStyle='#4f4';ctx.textAlign='center';ctx.fillText('DONE!',ix,ib-10);}ctx.restore();});
}

function dPl(p,sp,ok){
  const{x,y}=g2s(p.gx,p.gy);ctx.save();ctx.globalAlpha=.25;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x,y+TH/2+4,22,9,0,0,Math.PI*2);ctx.fill();ctx.restore();
  if(ok)ctx.drawImage(sp,p.fr*FW,p.dir*FH,FW,FH,x-DW/2,y+TH/2-DH+10,DW,DH);
  else{ctx.beginPath();ctx.arc(x,y+TH/2,16,0,Math.PI*2);ctx.fillStyle='#f0c040';ctx.fill();}
  if(p.carry){const inf=ITEMS[p.carry.t],bob=Math.sin(Date.now()/300)*3;ctx.save();ctx.beginPath();ctx.arc(x,y-DH/2-8+bob,14,0,Math.PI*2);ctx.fillStyle=inf.color+'cc';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(inf.sym,x,y-DH/2-7+bob);ctx.restore();}
}

function interact(p){
  let nr=null,nd=Infinity;for(const s of STA){const d=gd(p.gx,p.gy,s.gx+.5,s.gy+.5);if(d<IR&&d<nd){nr=s;nd=d;}}
  if(!nr)return;
  if(p.carry){const inf=ITEMS[p.carry.t];
    if(nr.n==='DELIVERY'&&p.carry.t==='DONE'){score++;spawnCel(nr.gx,nr.gy);p.carry=null;}
    else if(inf.st===nr.n){nr.items.push({t:p.carry.t,p:false,pr:0});p.carry=null;}
    else{const exp=Object.keys(ITEMS).find(k=>ITEMS[k].st===nr.n);if(exp&&inf.next===exp){nr.items.push({t:p.carry.t,p:true,pr:0});p.carry=null;}}
  } else {
    if(nr.items.length>0){let pi=nr.items.findIndex(i=>!i.p&&i.rdy);if(pi===-1)pi=nr.items.findIndex(i=>!i.p);if(pi>=0){const it=nr.items.splice(pi,1)[0];p.carry={t:it.rdy?it.rt:it.t};}}
  }
}

function updPl(p,up,dn,lt,rt,act){
  let ax=0,ay=0;if(up){ax--;ay--}if(dn){ax++;ay++}if(lt){ax--;ay++}if(rt){ax++;ay--}
  const inp=ax!==0||ay!==0;if(inp){const l=Math.sqrt(ax*ax+ay*ay);if(l>1){ax/=l;ay/=l}p.vx+=ax*ACCEL*.016;p.vy+=ay*ACCEL*.016}
  else{const s=Math.sqrt(p.vx**2+p.vy**2);if(s>.01){const ns=Math.max(0,s-FRIC*.016);p.vx*=ns/s;p.vy*=ns/s}else{p.vx=0;p.vy=0}}
  const spd=Math.sqrt(p.vx**2+p.vy**2);if(spd>MSPD){p.vx*=MSPD/spd;p.vy*=MSPD/spd}
  if(spd>.15){const a=Math.atan2(p.vy,p.vx);if(a>=0&&a<Math.PI/2)p.dir=DIR.DL;else if(a>=Math.PI/2)p.dir=DIR.UL;else if(a<0&&a>=-Math.PI/2)p.dir=DIR.DR;else p.dir=DIR.UR;}
  p.gx+=p.vx*.016;p.gy+=p.vy*.016;
  const MN=.3,MX=GC-.7,MY=GR-.7;
  if(p.gx<MN){p.gx=MN;p.vx=-p.vx*BNC}if(p.gx>MX){p.gx=MX;p.vx=-p.vx*BNC}
  if(p.gy<MN){p.gy=MN;p.vy=-p.vy*BNC}if(p.gy>MY){p.gy=MY;p.vy=-p.vy*BNC}
  for(const o of pls){if(o===p)continue;const d=gd(p.gx,p.gy,o.gx,o.gy);if(d<.6&&d>0){const nx=(p.gx-o.gx)/d,ny=(p.gy-o.gy)/d;const push=.6-d;p.gx+=nx*push*.5;p.gy+=ny*push*.5;o.gx-=nx*push*.5;o.gy-=ny*push*.5;p.vx+=nx*2;p.vy+=ny*2;o.vx-=nx*2;o.vy-=ny*2;}}
  const cs=Math.sqrt(p.vx**2+p.vy**2);p.mv=cs>.15;
  if(p.mv){p.at+=.016;if(p.at>1/Math.max(4,AFPS*cs/MSPD*1.5)){p.at=0;p.fr=(p.fr+1)%FC}}else{p.fr=0;p.at=0}
  if(act)interact(p);
}

// State serialization for network
function getState(){
  return{p1:{gx:p1.gx,gy:p1.gy,vx:p1.vx,vy:p1.vy,dir:p1.dir,fr:p1.fr,mv:p1.mv,carry:p1.carry},
    p2:{gx:p2.gx,gy:p2.gy,vx:p2.vx,vy:p2.vy,dir:p2.dir,fr:p2.fr,mv:p2.mv,carry:p2.carry},
    sta:STA.map(s=>({items:s.items})),score,particles:particles.length}
}
function applyState(d){
  if(!d)return;
  // Lerp factor: blend server state with local prediction to avoid snapping
  const L=0.4;
  // P1 is always server-authoritative (host controls P1)
  Object.assign(p1,d.p1);
  // P2: blend position if guest is predicting locally
  if(role==='guest'){
    p2.gx+=(d.p2.gx-p2.gx)*L;
    p2.gy+=(d.p2.gy-p2.gy)*L;
    p2.vx=d.p2.vx;p2.vy=d.p2.vy;
    p2.dir=d.p2.dir;p2.fr=d.p2.fr;p2.mv=d.p2.mv;p2.carry=d.p2.carry;
  } else {
    Object.assign(p2,d.p2);
  }
  score=d.score;
  d.sta.forEach((sd,i)=>{STA[i].items=sd.items});
}

let frameCount = 0;
function update(){
  spT+=.016;const ib=fSta('INBOX');if(spT>=SPI&&ib.items.length<3){ib.items.push({t:'RAW',p:false,pr:0});spT=0}
  for(const s of STA)for(const it of s.items){if(it.p){if(s.pt<=0){const nt=ITEMS[it.t].next;if(nt){it.p=false;it.rdy=true;it.rt=nt;it.t=nt}}else{it.pr+=.016;if(it.pr>=s.pt){const nt=ITEMS[it.t].next;if(nt){it.p=false;it.rdy=true;it.rt=nt;it.t=nt}}}}}

  if(role==='host'){
    // Host controls P1 locally, reads guest input for P2
    updPl(p1,keys['w'],keys['s'],keys['a'],keys['d'],!!jp[' ']);
    updPl(p2,guestInput.up,guestInput.down,guestInput.left,guestInput.right,guestInput.act);
    guestInput.act=false; // consume the action
    // Send state every 2 frames (~30fps updates)
    frameCount++;
    sendState(getState());
  } else if(role==='guest'){
    // Guest-side prediction: run local physics so movement feels instant
    updPl(p2,keys['w']||keys['arrowup']||keys['i'],keys['s']||keys['arrowdown']||keys['k'],
      keys['a']||keys['arrowleft']||keys['j'],keys['d']||keys['arrowright']||keys['l'],
      !!jp[' ']||!!jp['enter']);
    sendInput({up:keys['w']||keys['arrowup']||keys['i'],down:keys['s']||keys['arrowdown']||keys['k'],
      left:keys['a']||keys['arrowleft']||keys['j'],right:keys['d']||keys['arrowright']||keys['l'],
      act:!!jp[' ']||!!jp['enter']});
  } else {
    // Local mode (solo testing)
    updPl(p1,keys['w'],keys['s'],keys['a'],keys['d'],!!jp[' ']);
    if (botActive) {
      // Bot controls P2 via guestInput
      updPl(p2,guestInput.up,guestInput.down,guestInput.left,guestInput.right,guestInput.act);
      guestInput.act = false; // consume act
    } else {
      // Manual P2 on keyboard
      updPl(p2,keys['i'],keys['k'],keys['j'],keys['l'],!!jp['enter']);
    }
  }

  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.vy+=p.g*.016;p.x+=p.vx*.016;p.y+=p.vy*.016;p.life-=.016;if(p.life<=0)particles.splice(i,1)}
  for(const k in jp)delete jp[k];
  document.getElementById('score').textContent=score;
  document.getElementById('p1c').textContent=p1.carry?ITEMS[p1.carry.t].name:'—';
  document.getElementById('p2c').textContent=(botActive?'🤖 ':'')+(p2.carry?ITEMS[p2.carry.t].name:'—');
}

function render(){
  ctx.clearRect(0,0,CW,CH);ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,CW,CH);
  for(let r=0;r<GR;r++)for(let c=0;c<GC;c++)dTile(c,r);
  const dr=[];for(const s of STA)dr.push({d:s.gx+s.gy,f:()=>dSta(s)});
  dr.push({d:p1.gx+p1.gy,f:()=>dPl(p1,s1,s1ok)});dr.push({d:p2.gx+p2.gy,f:()=>dPl(p2,s2,s2ok)});
  dr.sort((a,b)=>a.d-b.d);for(const d of dr)d.f();
  for(const p of[p1,p2])for(const s of STA){const d=gd(p.gx,p.gy,s.gx+.5,s.gy+.5);if(d<IR){const{x,y}=g2s(s.gx,s.gy);ctx.save();ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle=p===p1?'#88bbff':'#ffbb88';ctx.globalAlpha=.6+.3*Math.sin(Date.now()/250);ctx.fillText(p===p1?'[SPACE]':'[ACT]',x+(p===p1?-15:15),y-32);ctx.restore();}}
  for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.ml);ctx.font=p.sz+'px sans-serif';ctx.textAlign='center';ctx.fillText(p.em,p.x,p.y);ctx.restore();}
  // Network indicator
  ctx.save();ctx.font='9px Outfit,sans-serif';ctx.textAlign='right';ctx.fillStyle=connected?'#4a4':'#a44';ctx.fillText(connected?(role==='host'?'● HOST':'● GUEST'):'● LOCAL',CW-10,16);
  if(botActive){ctx.fillStyle='#f0c040';ctx.fillText('🤖 BOT ACTIVE',CW-10,30);}
  ctx.restore();
}

function startGame(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game-wrap').style.display='flex';
  gameLoop();
}

function gameLoop(){update();render();requestAnimationFrame(gameLoop)}

// Allow local play without server (click anywhere on canvas)
document.getElementById('game-container').addEventListener('dblclick', () => {
  if (!connected && !role) { role = null; startGame(); }
});

// ==================== BOT AI ====================
function playWithBot() {
  role = null;
  botActive = true;
  startGame();
  startBot();
}

function startBot() {
  if (botInterval) clearInterval(botInterval);
  botActive = true;
  botActCooldown = 0;
  botInterval = setInterval(botThink, 50);
  console.log('[BOT] Started — 🤖 ACTIVE');
}

function stopBot() {
  if (botInterval) { clearInterval(botInterval); botInterval = null; }
  botActive = false;
  guestInput = { up:false, down:false, left:false, right:false, act:false };
  console.log('[BOT] Stopped — human took over');
}

function botThink() {
  if (!botActive) return;
  // Decrease act cooldown
  if (botActCooldown > 0) botActCooldown -= 50;

  // Reset inputs each tick
  guestInput.up = false;
  guestInput.down = false;
  guestInput.left = false;
  guestInput.right = false;
  guestInput.act = false;

  const prevState = botState;

  if (p2.carry) {
    // DELIVER: find the station to bring this item to
    botState = 'DELIVER';
    const carryType = p2.carry.t;
    const info = ITEMS[carryType];
    let targetStation = null;

    if (carryType === 'DONE') {
      // Deliver finished item to DELIVERY for scoring
      targetStation = fSta('DELIVERY');
    } else if (info.next) {
      // Find the station that is home to the next item type
      const nextInfo = ITEMS[info.next];
      if (nextInfo) targetStation = fSta(nextInfo.st);
    }

    if (targetStation) {
      botNavigate(targetStation.gx + 0.5, targetStation.gy + 0.5);
    }
  } else {
    // FETCH: find a ready item to pick up
    let bestStation = null;
    let bestScore = -Infinity;

    for (const s of STA) {
      const pickable = s.items.filter(i => !i.p && (i.rdy || s.n === 'INBOX'));
      if (pickable.length === 0) continue;

      // Skip if P1 is already adjacent and could grab it
      const p1dist = gd(p1.gx, p1.gy, s.gx + 0.5, s.gy + 0.5);
      if (p1dist < 1.2 && !p1.carry) continue;

      // Prefer ready items; score by how few items are queued at the NEXT station
      let sc = 10;
      const sample = pickable[0];
      const sampleType = sample.rdy ? sample.rt : sample.t;
      const sampleInfo = ITEMS[sampleType];
      if (sample.rdy) sc += 20; // strongly prefer ready items
      if (sampleInfo && sampleInfo.next) {
        const nextSta = fSta(ITEMS[sampleInfo.next]?.st);
        if (nextSta) sc -= nextSta.items.length * 5; // prefer least busy destination
      }
      // Closer is better
      const dist = gd(p2.gx, p2.gy, s.gx + 0.5, s.gy + 0.5);
      sc -= dist * 2;

      if (sc > bestScore) { bestScore = sc; bestStation = s; }
    }

    if (bestStation) {
      botState = 'FETCH';
      botNavigate(bestStation.gx + 0.5, bestStation.gy + 0.5);
    } else {
      botState = 'IDLE';
    }
  }

  if (prevState !== botState) {
    console.log(`[BOT] ${prevState} → ${botState}` + (p2.carry ? ` (carrying ${p2.carry.t})` : ''));
  }
}

function botNavigate(tx, ty) {
  // Clamp target to grid bounds (same as physics: MN=0.3, MX=GC-0.7, MY=GR-0.7)
  const MN = 0.3, MX = GC - 0.7, MY = GR - 0.7;
  tx = Math.max(MN + 0.1, Math.min(MX - 0.1, tx));
  ty = Math.max(MN + 0.1, Math.min(MY - 0.1, ty));

  const dx = tx - p2.gx;
  const dy = ty - p2.gy;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 0.8) {
    // Arrived — press act once then cooldown
    if (botActCooldown <= 0) {
      guestInput.act = true;
      botActCooldown = 300; // don't spam act
      console.log(`[BOT] ACT at (${p2.gx.toFixed(1)}, ${p2.gy.toFixed(1)})`);
    }
    return;
  }

  // Move toward target with deadzone
  if (dx > 0.15) guestInput.right = true;
  if (dx < -0.15) guestInput.left = true;
  if (dy > 0.15) guestInput.down = true;
  if (dy < -0.15) guestInput.up = true;
}
// Mobile touch controlsdocument.querySelectorAll(".mbtn").forEach(btn=>{  const k=btn.dataset.key;  btn.addEventListener("touchstart",e=>{e.preventDefault();keys[k]=true;jp[k]=true;btn.classList.add("pressed")},{passive:false});  btn.addEventListener("touchend",e=>{e.preventDefault();keys[k]=false;btn.classList.remove("pressed")},{passive:false});  btn.addEventListener("mousedown",e=>{keys[k]=true;jp[k]=true;btn.classList.add("pressed")});  btn.addEventListener("mouseup",e=>{keys[k]=false;btn.classList.remove("pressed")});});
</script>
